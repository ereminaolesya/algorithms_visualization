<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кластеризация</title>
    <link rel="stylesheet" href="../style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<h1 class="text">Кластеризация</h1>
<div class="wr">
    <canvas id="canvas" class = "canvasClastering"></canvas>
    <div class="controlsClM">
        <div class="left-panelClM">
            <label for="genCount">Количество кластеров для K-средних (1-10):</label>
            <input type="number" id="genKlast" min="1" max="10" value="3">

            <label for="genCount">Минимальное число точек в кластере для DBSCAN (1-10):</label>
            <input type="number" id="genCPoints" min="1" max="10" value="3">

            <label for="genCount">Количество кластеров для Агломеративной (1-10):</label>
            <input type="number" id="genKlastAl" min="1" max="10" value="3">

            <label for="genCount">Количество точек:</label>
            <input type="number" id="genCount" min="1" max="1000" value="50">
            <button onclick="generateRandomPoints()">СГЕНЕРИРОВАТЬ</button>
        </div>
        <div class="center-panelClM">
            <button onclick="runKMeans()">K-СРЕДНИХ</button>
            <button onclick="runDBSCAN()">DBSCAN</button>
            <button onclick="runAglomerativ()">Агломеративная</button>
        </div>
        <div class="right-panelClM">

            <button id="clear">ОЧИСТИТЬ</button>
            <a href="../index.html" class="back-button">Ко всем алгоритмам</a>
        </div>
    </div>
</div>
<script src="klasterizacia.js"></script>
</body>
</html>
